name: Apply core fixes SQL

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/apply-core-fixes-sql.yml"
      - "supabase/sql/fix-ownership-and-participation.sql"
  workflow_dispatch:

concurrency:
  group: srchr-dev-server
  cancel-in-progress: false

jobs:
  apply:
    name: Apply ownership and participation fixes on dev
    runs-on: ubuntu-latest

    steps:
      - name: Apply SQL patch over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          script: |
            set -e
            cd /opt/srchr-dev
            git update-ref -d refs/remotes/origin/main || true
            git fetch origin main
            git checkout main
            git reset --hard origin/main
            docker exec -i supabase-db psql -v ON_ERROR_STOP=1 -U supabase_admin -d postgres < supabase/sql/fix-ownership-and-participation.sql
            docker exec supabase-db psql -v ON_ERROR_STOP=1 -U supabase_admin -d postgres -c "select policyname, cmd from pg_policies where schemaname = 'public' and tablename in ('materials', 'event_participants') order by tablename, policyname;"
            docker exec supabase-db psql -v ON_ERROR_STOP=1 -U supabase_admin -d postgres -c "notify pgrst, 'reload schema';"
            docker restart supabase-rest supabase-kong
            pm2 restart srchr-dev --update-env
