name: Apply favorites SQL

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/apply-favorites-sql.yml"
      - "supabase/sql/create-favorites.sql"
  workflow_dispatch:

jobs:
  apply:
    name: Create favorites table on dev
    runs-on: ubuntu-latest

    steps:
      - name: Apply favorites SQL over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          script: |
            set -e
            cd /opt/srchr-dev
            git pull
            docker exec -i supabase-db psql -v ON_ERROR_STOP=1 -U postgres -d postgres < supabase/sql/create-favorites.sql
            docker exec supabase-db psql -v ON_ERROR_STOP=1 -U postgres -d postgres -c "select id, target_type, target_id, snapshot, status from public.favorites limit 1;"
            docker exec supabase-db psql -v ON_ERROR_STOP=1 -U postgres -d postgres -c "notify pgrst, 'reload schema';"
            docker restart supabase-rest supabase-kong
            sleep 10
            ANON_KEY="$(grep '^NEXT_PUBLIC_SUPABASE_ANON_KEY=' .env.local | cut -d= -f2-)"
            curl -fsS \
              -H "apikey: ${ANON_KEY}" \
              -H "Authorization: Bearer ${ANON_KEY}" \
              "http://127.0.0.1:8000/rest/v1/favorites?select=id&limit=1" \
              || (docker logs supabase-rest --tail 120 && exit 1)
            pm2 restart srchr-dev --update-env
