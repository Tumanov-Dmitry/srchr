name: Apply analytics SQL

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/apply-analytics-sql.yml"
      - "supabase/sql/create-analytics.sql"
  workflow_dispatch:

concurrency:
  group: srchr-dev-server
  cancel-in-progress: false

jobs:
  apply:
    name: Create analytics tables on dev
    runs-on: ubuntu-latest

    steps:
      - name: Apply analytics SQL over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          script: |
            set -e
            cd /opt/srchr-dev
            git update-ref -d refs/remotes/origin/main || true
            git fetch origin main
            git checkout main
            git reset --hard origin/main
            ANALYTICS_OWNER="$(docker exec supabase-db psql -U postgres -d postgres -Atc "select pg_get_userbyid(c.relowner) from pg_class c join pg_namespace n on n.oid = c.relnamespace where n.nspname = 'public' and c.relname = 'analytics_events';")"
            if [ -z "$ANALYTICS_OWNER" ]; then
              ANALYTICS_OWNER="supabase_admin"
            fi
            echo "Applying analytics SQL as table owner: $ANALYTICS_OWNER"
            docker exec -i supabase-db psql -v ON_ERROR_STOP=1 -U "$ANALYTICS_OWNER" -d postgres < supabase/sql/create-analytics.sql
            docker exec supabase-db psql -v ON_ERROR_STOP=1 -U "$ANALYTICS_OWNER" -d postgres -c "select event_type, target_type, created_at from public.analytics_events limit 1;"
            docker exec supabase-db psql -v ON_ERROR_STOP=1 -U "$ANALYTICS_OWNER" -d postgres -c "select date, metric_key, metric_value from public.analytics_daily_stats limit 1;"
            docker exec supabase-db psql -v ON_ERROR_STOP=1 -U "$ANALYTICS_OWNER" -d postgres -c "notify pgrst, 'reload schema';"
            docker restart supabase-rest supabase-kong
            sleep 10
            ANON_KEY="$(grep '^NEXT_PUBLIC_SUPABASE_ANON_KEY=' .env.local | cut -d= -f2- || true)"
            if [ -z "$ANON_KEY" ]; then
              ANON_KEY="$(grep '^ANON_KEY=' /opt/supabase/docker/.env | cut -d= -f2- | tr -d '\"' || true)"
            fi
            if [ -z "$ANON_KEY" ]; then
              echo "Anon key was not found"
              exit 1
            fi
            curl -fsS \
              -H "apikey: ${ANON_KEY}" \
              -H "Authorization: Bearer ${ANON_KEY}" \
              "http://127.0.0.1:8000/rest/v1/analytics_daily_stats?select=date,metric_key,metric_value&limit=1" \
              || (docker logs supabase-rest --tail 120 && exit 1)
            pm2 restart srchr-dev --update-env || true
