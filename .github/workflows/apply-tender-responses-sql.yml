name: Apply tender responses SQL

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/apply-tender-responses-sql.yml"
      - "supabase/sql/patch-tender-responses.sql"
  workflow_dispatch:

jobs:
  apply:
    name: Patch tender responses on dev
    runs-on: ubuntu-latest

    steps:
      - name: Apply tender responses SQL over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          script: |
            set -e
            cd /opt/srchr-dev
            git pull
            docker exec -i supabase-db psql -v ON_ERROR_STOP=1 -U supabase_admin -d postgres < supabase/sql/patch-tender-responses.sql
            docker exec supabase-db psql -v ON_ERROR_STOP=1 -U supabase_admin -d postgres -c "select id, responder_type, expert_id from public.tender_responses limit 1;"
            docker exec supabase-db psql -v ON_ERROR_STOP=1 -U supabase_admin -d postgres -c "notify pgrst, 'reload schema';"
            docker restart supabase-rest supabase-kong
            sleep 10
            SERVICE_KEY="$(grep '^SUPABASE_SERVICE_ROLE_KEY=' .env.local | cut -d= -f2- || true)"
            if [ -z "$SERVICE_KEY" ]; then
              SERVICE_KEY="$(grep '^SERVICE_ROLE_KEY=' /opt/supabase/docker/.env | cut -d= -f2- | tr -d '\"' || true)"
            fi
            if [ -z "$SERVICE_KEY" ]; then
              echo "Service role key was not found in .env.local or /opt/supabase/docker/.env"
              exit 1
            fi
            curl -fsS \
              -H "apikey: ${SERVICE_KEY}" \
              -H "Authorization: Bearer ${SERVICE_KEY}" \
              "http://127.0.0.1:8000/rest/v1/tender_responses?select=id,responder_type,expert_id&limit=1" \
              || (docker logs supabase-rest --tail 120 && exit 1)
            pm2 restart srchr-dev --update-env
